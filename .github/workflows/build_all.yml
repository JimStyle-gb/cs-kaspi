name: Build_All

on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'  # 02:00 Asia/Almaty

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Restore WB seen-products baseline
        uses: actions/cache@v4
        with:
          path: artifacts/state/wb_seen_products_baseline.json
          key: cs-kaspi-wb-seen-products-${{ github.run_id }}
          restore-keys: |
            cs-kaspi-wb-seen-products-
      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run full CS-Kaspi pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scripts.cs_kaspi.commands.build_all
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build_all_artifacts
          path: |
            artifacts
            !artifacts/exports/kaspi_images/**
          if-no-files-found: warn
