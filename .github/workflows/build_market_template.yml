name: Build_Market_Template

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Refresh official sources
        run: python -m scripts.cs_kaspi.commands.refresh_official_sources
      - name: Refresh market data
        run: python -m scripts.cs_kaspi.commands.refresh_market_data
      - name: Build master catalog
        run: python -m scripts.cs_kaspi.commands.build_master_catalog
      - name: Build market template
        run: python -m scripts.cs_kaspi.commands.build_market_template
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market_template_artifacts
          path: artifacts
          if-no-files-found: warn
