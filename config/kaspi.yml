defaults:
  currency: KZT
  stock_when_market_missing: 0
  lead_time_days_when_market_missing: 20
  max_images: 10
  title_max_length: 120

title_policy:
  use_vaitan_in_title: true
  title_prefix: VAITAN
  uniqueness_goal: own_kaspi_cards_not_attach_to_competitors
  keep_real_brand: true
  real_brand_position: after_vaitan
  include_market_variant_in_title: true

price_policy:
  source: market_layer
  market_sources_for_price:
    - wb
  forbidden_price_sources:
    - google
    - kaspi
  choose_market_price: lowest_sellable_price_inside_same_variant
  allow_official_price_as_final: false
  fallback_price: null
  markup_percent: 30
  fixed_add_kzt: 0
  min_margin_kzt: 0
  round_to_kzt: 100
  rounding_mode: floor
  note: После наценки 30% последние две цифры цены обрезаются до 00, например 199485 -> 199400.

lead_time_policy:
  source: market_eta
  copy_market_eta_without_extra_buffer: true
  safety_buffer_days: 0
  fallback_days_when_market_eta_missing: 3
  missing_market_days: 20

delivery:
  mode: draft_only
  live_send_enabled: false
  company: DRAFT_COMPANY
  merchant_id: DRAFT_MERCHANT_ID
  store_id: DRAFT_STORE_ID
  api_create_enabled: false
  xml_price_stock_enabled: false
  note: Live delivery is intentionally disabled. Project prepares draft API/XML only.

image_package:
  enabled: true
  download_images: true
  create_zip: true
  keep_unzipped_images: false
  output_format: jpg
  jpeg_quality: 95
  max_side_px: 0
  max_images_per_product: 10
  min_images_per_product: 1
  timeout_sec: 25
  retries: 2
  min_bytes: 512
  user_agent: CS-Kaspi/1.0 (+https://github.com/JimStyle-gb/CS-Kaspi)
  note: Обычный Build_All собирает kaspi_images.zip с путями images/<merchant_sku>/01.jpg. Достаточным считается минимум 1 рабочее фото на товар; дополнительные битые/timeout/404 ссылки не считаются ошибкой, если минимум уже скачан. JPG/JPEG из источника сохраняются как есть без пережатия; WebP/PNG конвертируются в JPG с высоким качеством 95; max_side_px=0 означает не уменьшать фото. Папка с распакованными фото после ZIP удаляется, чтобы artifact не хранил фото два раза. Для отключения скачивания установить CS_KASPI_DOWNLOAD_IMAGES=0.
