title_rules:
  prefix_brand_if_allowed: true
  prefer_store_brand_prefix: true
  store_brand_name: VAITAN
  max_title_length: 250

price_rules:
  strategy: manual_policy
  fallback_currency: KZT

stock_rules:
  default_stock_if_sellable: 5
  set_zero_if_market_not_found: true

lead_time_rules:
  default_days: 1

status_rules:
  pause_when_market_not_found: true
  create_only_if_kaspi_ready: true
  update_only_if_changed_kaspi: true
