discovery:
  enabled: true
  mode: wb_seed_listing_only
  no_fallback_search: true
  fetch_product_pages: false
  fail_build_on_seed_error: false
  max_cards_per_seed: 1200
  baseline_drop_warning_ratio: 0.45
  business_rule: wb_demiand_items_are_sellable_official_is_enrichment_only

browser:
  engine: chromium
  headless: true
  # WB profile session mode: use a separate WB account/session from GitHub Secrets.
  # Secret must be Playwright storage_state JSON encoded as base64 in WB_STORAGE_STATE_B64.
  profile_session_enabled: true
  profile_storage_state_env: WB_STORAGE_STATE_B64
  profile_safe_no_ui_switch: true
  profile_safe_no_request_rewrite: true
  # If no profile session is available, live GitHub mode still tries to request KZT/Almaty.
  force_request_currency_kzt: true
  force_geo_request_almaty: true
  viewport_width: 1440
  viewport_height: 1400
  goto_timeout_ms: 60000
  wait_after_open_ms: 5000
  blocked_soft_wait_ms: 9000
  scroll_step_px: 1200
  scroll_wait_ms: 1500
  max_scroll_rounds: 60
  stop_after_rounds_without_new: 8
  delivery_city: Алматы
  delivery_popup_wait_ms: 1500
  delivery_search_wait_ms: 2500
  delivery_apply_wait_ms: 3500
  currency_switch_wait_ms: 5000

matching:
  required_model_match: false
  required_brand_match: true
  exact_color_match_required: false
  exact_bundle_match_required: false
  allow_market_bundle_as_kaspi_variant: true
  accept_wb_brand_items_as_sellable_variants: true
  official_source_is_enrichment_not_exact_filter: true
  allow_market_only_when_official_missing: true
  collapse_only_same_market_variant: true
  minimum_confidence_for_auto_market_record: 65
  confidence_for_review: 45
  rejected_below_confidence: 45

pricing:
  choose_lowest_price_inside_same_variant: true
  markup_percent: 30
  rounding_mode: floor_to_100

lead_time:
  copy_market_eta_without_extra_buffer: true
  safety_buffer_days: 0
  fallback_days_when_missing: 3

seeds:
  - seed_key: wb_demiand_cooking
    source: wb
    supplier_key: demiand
    brand: DEMIAND
    enabled: true
    url: https://www.wildberries.ru/catalog/elektronika/tehnika-dlya-kuhni/prigotovlenie-blyud?page=1&sort=popular&fbrand=53038

  - seed_key: wb_demiand_drinks
    source: wb
    supplier_key: demiand
    brand: DEMIAND
    enabled: true
    url: https://www.wildberries.ru/catalog/elektronika/tehnika-dlya-kuhni/prigotovlenie-napitkov?sort=popular&page=1&fbrand=53038

  - seed_key: wb_demiand_blending
    source: wb
    supplier_key: demiand
    brand: DEMIAND
    enabled: true
    url: https://www.wildberries.ru/catalog/elektronika/tehnika-dlya-kuhni/izmelchenie-i-smeshivanie?sort=popular&page=1&fbrand=53038

  - seed_key: wb_demiand_accessories
    source: wb
    supplier_key: demiand
    brand: DEMIAND
    enabled: true
    url: https://www.wildberries.ru/catalog/elektronika/tehnika-dlya-kuhni/aksessuary-dlya-kuhonnoy-tehniki?sort=popular&page=1&fbrand=53038
