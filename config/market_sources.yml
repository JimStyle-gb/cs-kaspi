    url: https://www.wildberries.ru/catalog/elektronika/tehnika-dlya-kuhni/prigotovlenie-napitkov?sort=popular&page=1&fbrand=53038

  - seed_key: wb_demiand_blending
    source: wb
    supplier_key: demiand
