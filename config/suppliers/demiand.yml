supplier_key: demiand
supplier_name: DEMIAND
brand_name: DEMIAND
enabled: true

official_source:
  source_type: website
  base_url: "https://demiand.ru"
  catalog_root_url: "https://demiand.ru/product-category/"
  use_official_as_source_of_truth: true

fetch_rules:
  fetch_categories: true
  fetch_catalog_pages: true
  fetch_product_pages: true
  fetch_manuals: true

  request_timeout_seconds: 30
  retry_count: 2
  retry_sleep_seconds: 3

  pagination_mode: page_number
  pagination_param_template: "page/{page}/"

  save_raw_catalog_pages: true
  save_raw_product_pages: true
  save_raw_manuals: true

category_roots:
  - supplier_category_name: "Товары для кухни"
    root_url: "https://demiand.ru/product-category/for-kitchen/"
    enabled: true

category_mapping:
  "Аэрогрили": "air_fryers"
  "Аксессуары для аэрогрилей": "air_fryer_accessories"
  "Блендеры": "blenders"
  "Кофеварки": "coffee_makers"
  "Печи": "ovens"

identity_rules:
  default_brand: "DEMIAND"
  product_key_prefix: "demiand"
  prefer_article_as_product_id: true
  prefer_json_ld_sku_as_fallback: true
  fallback_to_slug_if_no_article: true

content_rules:
  use_h1_as_official_title: true
  use_short_description: true
  use_full_description: true
  use_breadcrumbs: true
  use_json_ld_backup: true

media_rules:
  use_gallery_images: true
  deduplicate_images: true
  keep_image_order: true

spec_rules:
  parse_attributes_table: true
  keep_specs_raw: true
  normalize_units_later: true

availability_rules:
  prefer_json_ld_availability: true
  fallback_to_visible_stock_text: true

price_rules:
  parse_current_price: true
  parse_old_price: true
  currency: "RUB"

state_files:
  product_index_file: "artifacts/state/demiand_product_index.json"
  official_products_file: "artifacts/state/demiand_official_products.json"
  supplier_state_file: "artifacts/state/official_state.json"

input_dirs:
  catalog_pages_dir: "input/official/demiand/catalog_pages"
  product_pages_dir: "input/official/demiand/product_pages"
  manuals_dir: "input/official/demiand/manuals"

notes: "Первый официальный поставщик для CS-Kaspi. Главный источник контента и характеристик."
